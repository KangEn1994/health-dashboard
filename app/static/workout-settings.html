<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>训练配置 - Health Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260515-workout-ui-5" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script defer src="/static/app.js?v=20260515-workout-ui-5"></script>
  </head>
  <body data-page="workout-settings">
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            <h1>训练配置</h1>
            <p>用于查看内置训练内容，并维护力量训练与有氧训练的部位、动作和分组计划。</p>
          </div>
        </div>
        <nav class="nav">
          <a href="/">看板</a>
          <a href="/records">记录管理</a>
          <a href="/workouts">训练记录</a>
          <a href="/workout-settings">训练配置</a>
          <a href="/metrics">指标配置</a>
          <a href="/docs">接口文档</a>
          <a href="#" data-logout-link>退出</a>
        </nav>
      </header>

      <div class="card-grid">
        <section class="panel span-12">
          <h3>内置训练内容</h3>
          <p class="muted">先看当前有哪些部位、动作模板和计划，再决定是否真的需要新增。</p>
          <div class="summary-grid" id="presetOverviewGrid"></div>
          <div id="workoutSettingsHint" class="muted" style="margin-top: 12px;">如果下拉未及时更新，刷新页面后会自动按最新训练部位重建选项。</div>
          <div class="card-grid" style="margin-top: 18px;">
            <div class="span-7">
              <div class="metrics-grid" id="workoutCatalogPanels"></div>
            </div>
            <div class="span-5">
              <div class="metrics-grid" id="workoutPlanPanels"></div>
            </div>
          </div>
        </section>

        <section class="panel span-4" id="workoutConfigSection">
          <h3>新增训练部位</h3>
          <p class="muted">当内置部位不够时再扩展，部位 ID 会自动生成。</p>
          <div id="workoutPartStatus" class="status-pill">等待操作</div>
          <form id="workoutPartForm">
            <label>
              名称
              <input type="text" name="label" placeholder="胸部" required />
            </label>
            <label>
              颜色
              <input type="color" name="color" value="#ef4444" />
            </label>
            <label>
              排序
              <input type="number" name="sort_order" value="100" min="0" max="9999" />
            </label>
            <label><input type="checkbox" name="active" checked /> 启用</label>
            <button type="submit">保存部位</button>
          </form>
        </section>

        <section class="panel span-4">
          <h3 id="workoutExerciseTitle">新增动作</h3>
          <p class="muted">每个动作都可以带一个可自由编辑的动作细节提示，动作 ID 会自动生成。</p>
          <div id="workoutExerciseStatus" class="status-pill">等待操作</div>
          <form id="workoutExerciseForm">
            <input type="hidden" name="edit_part_id" />
            <input type="hidden" name="edit_exercise_id" />
            <input type="hidden" name="edit_active" />
            <input type="hidden" name="edit_sort_order" />
            <label>
              所属部位
              <select name="part_id" required></select>
            </label>
            <label>
              动作名
              <input type="text" name="name" placeholder="高位下拉" required />
            </label>
            <label>
              简介
              <textarea name="description" placeholder="动作的用途或发力重点"></textarea>
            </label>
            <label>
              细节描述提示
              <input type="text" name="detail_placeholder" placeholder="如：宽握、拉向锁骨" />
            </label>
            <div class="actions">
              <button type="submit" id="workoutExerciseSubmit">保存动作</button>
              <button type="button" id="cancelWorkoutExerciseEdit" class="secondary" style="display:none;">取消编辑</button>
            </div>
          </form>
        </section>

        <section class="panel span-4">
          <h3>新增分组计划</h3>
          <p class="muted">一个计划可以包含多个训练组，每组可选择不同部位和动作。</p>
          <div id="workoutPlanStatus" class="status-pill">等待操作</div>
          <form id="workoutPlanForm">
            <label>
              计划名
              <input type="text" name="name" placeholder="推日 A" required />
            </label>
            <label>
              说明
              <textarea name="description" placeholder="这套计划适合什么目标"></textarea>
            </label>
            <div id="workoutPlanGroups" class="list-grid compact-list"></div>
            <div class="actions">
              <button type="button" id="addWorkoutPlanGroup" class="secondary">添加训练组</button>
              <button type="submit">保存计划</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>
